<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Notes App</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
          --ink:   #0f0e17;
          --cream: #fffcf5;
          --amber: #f4a135;
          --rust:  #e05c2a;
          --sage:  #3d6b5e;
          --muted: #7a7672;
          --card:  #ffffff;
          --shadow: 0 8px 40px rgba(15,14,23,0.12);
        }
        body {
          min-height: 100vh;
          background: var(--cream);
          font-family: 'DM Sans', sans-serif;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
          position: relative;
        }
        body::before {
          content: '';
          position: fixed;
          top: -120px; left: -80px;
          width: 420px; height: 420px;
          border-radius: 50%;
          background: radial-gradient(circle, #3d6b5e33 0%, transparent 70%);
          pointer-events: none;
        }
        body::after {
          content: '';
          position: fixed;
          bottom: -100px; right: -100px;
          width: 400px; height: 400px;
          border-radius: 50%;
          background: radial-gradient(circle, #f4a13544 0%, transparent 70%);
          pointer-events: none;
        }
        .card {
          background: var(--card);
          border-radius: 24px;
          padding: 52px 48px 44px;
          width: 100%;
          max-width: 460px;
          box-shadow: var(--shadow);
          animation: slideUp 0.5s cubic-bezier(.22,1,.36,1) both;
          position: relative;
          z-index: 1;
        }
        @keyframes slideUp {
          from { opacity: 0; transform: translateY(28px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .brand {
          display: flex;
          align-items: center;
          gap: 10px;
          margin-bottom: 32px;
        }
        .brand-icon {
          width: 42px; height: 42px;
          background: var(--ink);
          border-radius: 12px;
          display: grid; place-items: center;
          font-size: 20px;
        }
        .brand-name {
          font-family: 'Playfair Display', serif;
          font-size: 22px;
          font-weight: 900;
          color: var(--ink);
          letter-spacing: -0.5px;
        }
        .accent-bar {
          width: 40px; height: 4px;
          background: var(--sage);
          border-radius: 2px;
          margin-bottom: 18px;
        }
        h1 {
          font-family: 'Playfair Display', serif;
          font-size: 34px;
          font-weight: 700;
          color: var(--ink);
          line-height: 1.1;
          margin-bottom: 8px;
        }
        .subtitle {
          color: var(--muted);
          font-size: 14px;
          font-weight: 300;
          margin-bottom: 36px;
        }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .field { margin-bottom: 20px; }
        label {
          display: block;
          font-size: 12px;
          font-weight: 500;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: var(--muted);
          margin-bottom: 8px;
        }
        input {
          width: 100%;
          padding: 14px 16px;
          border: 1.5px solid #e8e4dc;
          border-radius: 12px;
          font-family: 'DM Sans', sans-serif;
          font-size: 15px;
          color: var(--ink);
          background: #faf9f6;
          outline: none;
          transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
          border-color: var(--sage);
          box-shadow: 0 0 0 3px rgba(61,107,94,0.12);
          background: #fff;
        }
        .btn {
          width: 100%;
          padding: 16px;
          border: none;
          border-radius: 12px;
          font-family: 'DM Sans', sans-serif;
          font-size: 15px;
          font-weight: 500;
          cursor: pointer;
          transition: transform 0.15s, box-shadow 0.15s;
          margin-top: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
          background: var(--sage);
          color: #fff;
          box-shadow: 0 4px 16px rgba(61,107,94,0.25);
        }
        .btn-primary:hover {
          box-shadow: 0 6px 24px rgba(61,107,94,0.35);
          transform: translateY(-1px);
        }
        .msg {
          margin-top: 14px;
          padding: 12px 16px;
          border-radius: 10px;
          font-size: 13.5px;
          display: none;
          animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .msg.error   { background: #fef0eb; color: var(--rust); border: 1px solid #f9c9b7; display: block; }
        .msg.success { background: #eaf3f0; color: var(--sage); border: 1px solid #b7d9ce; display: block; }
        .footer-link {
          text-align: center;
          margin-top: 24px;
          font-size: 13.5px;
          color: var(--muted);
        }
        .footer-link a {
          color: var(--rust);
          font-weight: 500;
          text-decoration: none;
        }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">
        <div class="brand-icon">📝</div>
        <span class="brand-name">Notes</span>
    </div>
    <div class="accent-bar"></div>
    <h1>Create account.</h1>
    <p class="subtitle">Start capturing your thoughts</p>

    <div class="row">
        <div class="field">
            <label for="firstname">First Name</label>
            <input type="text" id="firstname" placeholder="Ada">
        </div>
        <div class="field">
            <label for="lastname">Last Name</label>
            <input type="text" id="lastname" placeholder="Lovelace">
        </div>
    </div>
    <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
    </div>

    <button class="btn btn-primary" onclick="register()">Create Account</button>
    <div id="msg" class="msg"></div>
    <p class="footer-link">Already have an account? <a href="login.html">Login here</a></p>
</div>

<script>
    async function register() {
      const firstname = document.getElementById('firstname').value.trim();
      const lastname  = document.getElementById('lastname').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const msg       = document.getElementById('msg');
      msg.className = 'msg';
      msg.textContent = '';

      if (!firstname || !lastname || !email || !password) {
        msg.className = 'msg error';
        msg.textContent = 'Please fill in all fields.';
        return;
      }
      if (password.length < 8) {
        msg.className = 'msg error';
        msg.textContent = 'Password must be at least 8 characters.';
        return;
      }
      try {
        const res = await fetch('http://localhost:8090/api/v1/users/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firstName: firstname, lastName: lastname, email, password })
        });
        const data = await res.json();
        if (res.ok && (data.statusCode === 200 || data.statusCode === 201)) {
          msg.className = 'msg success';
          msg.textContent = 'Account created! Redirecting to login…';
          setTimeout(() => window.location.href = 'login.html', 1200);
        } else {
          msg.className = 'msg error';
          msg.textContent = data.message || 'Registration failed. Please try again.';
        }
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = 'Could not connect to server. Is it running?';
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
          --ink:#0f0e17; --cream:#fffcf5; --amber:#f4a135; --rust:#e05c2a;
          --sage:#3d6b5e; --muted:#7a7672; --card:#ffffff; --border:#ede9e0;
          --note1:#fff8ee; --note2:#eef5f2; --note3:#fef0eb; --note4:#f0eef8;
        }
        body { min-height:100vh; background:var(--cream); font-family:'DM Sans',sans-serif; color:var(--ink); }
        .topbar { position:sticky; top:0; z-index:100; background:var(--ink); padding:0 32px; height:64px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 20px rgba(15,14,23,0.2); }
        .topbar-brand { display:flex; align-items:center; gap:10px; }
        .topbar-brand .icon { font-size:20px; }
        .topbar-brand .name { font-family:'Playfair Display',serif; font-size:20px; font-weight:900; color:#fff; letter-spacing:-0.5px; }
        .topbar-right { display:flex; align-items:center; gap:16px; }
        .user-chip { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.1); border-radius:100px; padding:6px 14px 6px 8px; }
        .user-avatar { width:28px; height:28px; background:var(--amber); border-radius:50%; display:grid; place-items:center; font-size:13px; font-weight:600; color:var(--ink); }
        .user-name { font-size:13px; color:rgba(255,255,255,0.85); }
        .btn-logout { background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.8); border:1px solid rgba(255,255,255,0.18); border-radius:8px; padding:7px 14px; font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; transition:background 0.2s; }
        .btn-logout:hover { background:rgba(255,255,255,0.2); }
        .main { max-width:960px; margin:0 auto; padding:40px 24px 80px; }
        .page-header { margin-bottom:36px; animation:fadeUp 0.4s ease both; }
        .page-header h1 { font-family:'Playfair Display',serif; font-size:42px; font-weight:900; line-height:1.05; letter-spacing:-1px; }
        .page-header h1 span { color:var(--amber); }
        .page-header p { color:var(--muted); font-size:15px; margin-top:8px; }
        .compose { background:var(--card); border-radius:20px; padding:28px; box-shadow:0 2px 16px rgba(15,14,23,0.07); margin-bottom:40px; border:1.5px solid var(--border); animation:fadeUp 0.5s 0.1s ease both; }
        .compose h2 { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; margin-bottom:18px; }
        .compose input, .compose textarea { width:100%; border:1.5px solid var(--border); border-radius:12px; padding:12px 16px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--ink); background:#faf9f6; outline:none; transition:border-color 0.2s,box-shadow 0.2s; resize:vertical; }
        .compose input { margin-bottom:12px; }
        .compose textarea { min-height:100px; }
        .compose input:focus, .compose textarea:focus { border-color:var(--amber); box-shadow:0 0 0 3px rgba(244,161,53,0.12); background:#fff; }
        .compose-footer { display:flex; justify-content:flex-end; margin-top:14px; }
        .btn-add { background:var(--ink); color:#fff; border:none; border-radius:10px; padding:12px 28px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:transform 0.15s,box-shadow 0.15s; box-shadow:0 4px 14px rgba(15,14,23,0.18); }
        .btn-add:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(15,14,23,0.25); }
        .btn-add:active { transform:scale(0.97); }
        .compose-msg { margin-top:12px; font-size:13px; display:none; }
        .compose-msg.error { color:var(--rust); display:block; }
        .compose-msg.success { color:var(--sage); display:block; }
        .section-label { font-size:12px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:16px; display:flex; align-items:center; gap:10px; }
        .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
        .notes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:18px; }
        .note-card:nth-child(4n+1) { background:var(--note1); }
        .note-card:nth-child(4n+2) { background:var(--note2); }
        .note-card:nth-child(4n+3) { background:var(--note3); }
        .note-card:nth-child(4n+4) { background:var(--note4); }
        .note-card { border-radius:16px; padding:22px 20px 16px; border:1.5px solid var(--border); animation:fadeUp 0.4s ease both; transition:transform 0.2s,box-shadow 0.2s; }
        .note-card:hover { transform:translateY(-3px); box-shadow:0 8px 28px rgba(15,14,23,0.09); }
        .note-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; color:var(--ink); margin-bottom:8px; line-height:1.3; }
        .note-content { font-size:13.5px; color:#4a4540; line-height:1.6; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:16px; }
        .note-footer { display:flex; align-items:center; justify-content:space-between; }
        .note-date { font-size:11px; color:var(--muted); font-weight:300; }
        .note-actions { display:flex; gap:6px; }
        .btn-icon { background:rgba(15,14,23,0.06); border:none; border-radius:7px; width:30px; height:30px; display:grid; place-items:center; cursor:pointer; font-size:14px; transition:background 0.15s; }
        .btn-icon:hover { background:rgba(15,14,23,0.12); }
        .btn-icon.delete:hover { background:#fde8e0; }
        .note-card.editing .note-title, .note-card.editing .note-content { display:none; }
        .note-card .edit-area { display:none; }
        .note-card.editing .edit-area { display:block; }
        .edit-area input, .edit-area textarea { width:100%; border:1.5px solid var(--border); border-radius:10px; padding:10px 12px; font-family:'DM Sans',sans-serif; font-size:13.5px; color:var(--ink); background:rgba(255,255,255,0.7); outline:none; margin-bottom:8px; }
        .edit-area textarea { min-height:80px; resize:vertical; }
        .edit-area input:focus, .edit-area textarea:focus { border-color:var(--amber); }
        .edit-actions { display:flex; gap:6px; justify-content:flex-end; margin-top:4px; }
        .btn-save, .btn-cancel { border:none; border-radius:8px; padding:7px 14px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; }
        .btn-save { background:var(--ink); color:#fff; }
        .btn-cancel { background:var(--border); color:var(--muted); }
        .empty-state { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); }
        .empty-state .emoji { font-size:48px; display:block; margin-bottom:16px; }
        .spinner { grid-column:1/-1; text-align:center; padding:40px; color:var(--muted); font-size:14px; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>
<nav class="topbar">
    <div class="topbar-brand">
        <span class="icon">📝</span>
        <span class="name">Notes</span>
    </div>
    <div class="topbar-right">
        <div class="user-chip">
            <div class="user-avatar" id="avatarInitial">?</div>
            <span class="user-name" id="topbarName">...</span>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<main class="main">
    <div class="page-header">
        <h1>Your <span>Notes.</span></h1>
        <p id="greetMsg">Loading...</p>
    </div>
    <div class="compose">
        <h2>✏️ New Note</h2>
        <input type="text" id="noteTitle" placeholder="Note title…">
        <textarea id="noteContent" placeholder="What's on your mind?"></textarea>
        <div class="compose-footer">
            <button class="btn-add" onclick="createNote()">Add Note</button>
        </div>
        <div id="composeMsg" class="compose-msg"></div>
    </div>
    <div class="section-label">All Notes</div>
    <div class="notes-grid" id="notesList">
        <div class="spinner">Loading notes…</div>
    </div>
</main>

<script>
    const BASE = 'http://localhost:8090';
    const userId = localStorage.getItem('userId');
    const userName = localStorage.getItem('userName') || 'there';

    if (!userId) window.location.href = 'login.html';

    document.getElementById('topbarName').textContent = userName;
    document.getElementById('avatarInitial').textContent = userName.charAt(0).toUpperCase();
    document.getElementById('greetMsg').textContent = 'Good to see you, ' + userName + '!';

    async function loadNotes() {
      const grid = document.getElementById('notesList');
      grid.innerHTML = '<div class="spinner">Loading notes…</div>';
      try {
        const res = await fetch(BASE + '/api/v1/notes/retrieve-all/' + userId);
        const data = await res.json();
        const notes = Array.isArray(data.data) ? data.data : (data.data ? [data.data] : []);
        renderNotes(notes);
      } catch (e) {
        grid.innerHTML = '<div class="spinner">Could not load notes. Check your connection.</div>';
      }
    }

    function renderNotes(notes) {
      const grid = document.getElementById('notesList');
      if (!notes.length) {
        grid.innerHTML = '<div class="empty-state"><span class="emoji">📭</span><p>No notes yet. Write your first one above!</p></div>';
        return;
      }
      grid.innerHTML = '';
      notes.forEach(function(note, i) {
        const card = document.createElement('div');
        card.className = 'note-card';
        card.style.animationDelay = (i * 0.05) + 's';
        const dateStr = note.createdAt ? new Date(note.createdAt).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) : '';
        card.innerHTML =
          '<div class="note-title">' + escHtml(note.title || 'Untitled') + '</div>' +
          '<div class="note-content">' + escHtml(note.content || '') + '</div>' +
          '<div class="edit-area">' +
            '<input type="text" class="edit-title" value="' + escHtml(note.title || '') + '">' +
            '<textarea class="edit-content">' + escHtml(note.content || '') + '</textarea>' +
            '<div class="edit-actions">' +
              '<button class="btn-cancel" onclick="cancelEdit(this)">Cancel</button>' +
              '<button class="btn-save" onclick="saveEdit(this,' + note.id + ')">Save</button>' +
            '</div>' +
          '</div>' +
          '<div class="note-footer">' +
            '<span class="note-date">' + dateStr + '</span>' +
            '<div class="note-actions">' +
              '<button class="btn-icon" onclick="startEdit(this)">✏️</button>' +
              '<button class="btn-icon delete" onclick="deleteNote(' + note.id + ',this)">🗑️</button>' +
            '</div>' +
          '</div>';
        grid.appendChild(card);
      });
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function createNote() {
      const title = document.getElementById('noteTitle').value.trim();
      const content = document.getElementById('noteContent').value.trim();
      const msg = document.getElementById('composeMsg');
      msg.className = 'compose-msg';
      msg.textContent = '';
      if (!title || !content) {
        msg.className = 'compose-msg error';
        msg.textContent = 'Please add both a title and content.';
        return;
      }
      try {
        const res = await fetch(BASE + '/api/v1/notes/create/' + userId, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({title: title, content: content})
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('noteTitle').value = '';
          document.getElementById('noteContent').value = '';
          msg.className = 'compose-msg success';
          msg.textContent = 'Note saved!';
          setTimeout(function() { msg.textContent = ''; msg.className = 'compose-msg'; }, 2000);
          loadNotes();
        } else {
          msg.className = 'compose-msg error';
          msg.textContent = data.message || 'Failed to save note.';
        }
      } catch (e) {
        msg.className = 'compose-msg error';
        msg.textContent = 'Server error. Try again.';
      }
    }

    function startEdit(btn) { btn.closest('.note-card').classList.add('editing'); }
    function cancelEdit(btn) { btn.closest('.note-card').classList.remove('editing'); }

    async function saveEdit(btn, noteId) {
      const card = btn.closest('.note-card');
      const title = card.querySelector('.edit-title').value.trim();
      const content = card.querySelector('.edit-content').value.trim();
      if (!title || !content) return;
      try {
        const res = await fetch(BASE + '/api/v1/notes/update/' + noteId, {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({title: title, content: content})
        });
        if (res.ok) loadNotes();
      } catch (e) {
        alert('Could not save. Try again.');
      }
    }

    async function deleteNote(noteId, btn) {
      if (!confirm('Delete this note?')) return;
      const card = btn.closest('.note-card');
      card.style.opacity = '0.4';
      try {
        await fetch(BASE + '/api/v1/notes/delete/' + noteId, {method: 'DELETE'});
        card.style.transition = 'opacity 0.3s,transform 0.3s';
        card.style.transform = 'scale(0.95)';
        setTimeout(loadNotes, 300);
      } catch (e) {
        card.style.opacity = '1';
        alert('Delete failed.');
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'login.html';
    }

    loadNotes();
</script>
</body>
</html>
